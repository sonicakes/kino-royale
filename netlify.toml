[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD"
    Access-Control-Allow-Headers = "*"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store"
